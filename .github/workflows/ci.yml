name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type Check
        run: mypy src
      - name: Test with coverage
        run: pytest -q --tb=short --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Legal-support captured artifacts contract
        run: python scripts/refresh_qa_eval_captured_reports.py --check --scenario legal_support --scenario legal_support_full_pack_goldens
      - name: Campaign workflow smoke
        run: python scripts/wave_workflow_smoke.py
      - name: Streamlit smoke
        run: python scripts/streamlit_smoke.py
      - name: Security Scan
        run: bandit -r src -q -ll -ii
      - name: Dependency Audit
        run: python scripts/dependency_audit.py
