version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - python
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - ci
      - github-actions
